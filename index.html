<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ChronoLeak</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

<h1>ChronoLeak</h1>
<p class="tagline">Track Your Time — Stop Your Leaks</p>

<!-- TIMER -->
<div class="timer-box">
    <h2 id="timer">00:00</h2>
    <button onclick="startTimer()">Start</button>
    <button onclick="stopTimer()">Stop</button>
    <button onclick="resetTimer()">Reset</button>
</div>

<!-- CHARTS -->
<div class="charts">
    <div class="chart-card">
        <h3>Leak Trend (Line Chart)</h3>
        <canvas id="lineChart"></canvas>
    </div>
    <div class="chart-card">
        <h3>Leak Distribution (Pie)</h3>
        <canvas id="pieChart"></canvas>
    </div>
</div>

<!-- WEEKLY REPORT -->
<section class="weekly">
<h2>Weekly Report</h2>
<p id="weeklyReport">No data yet...</p>
</section>

<!-- AI INSIGHTS -->
<section class="insights">
<h2>AI Insights</h2>
<div id="insight-list">
<p>Waiting for data...</p>
</div>
</section>

<!-- PRODUCTIVITY SCORE -->
<section class="score">
<h2>Productivity Score</h2>
<h1 id="scoreValue">--</h1>
<p id="scoreMessage">Work and stop wasting time 😤</p>
</section>

<!-- FOCUS MODE -->
<section class="focus-mode">
<h2>Focus Mode</h2>
<button onclick="startFocus()">Enable Focus Mode</button>
<button onclick="stopFocus()">Disable Focus Mode</button>
<p id="focusStatus">Focus Mode is OFF</p>
</section>

</div>

<script src="script.js"></script>

</body>
</html>
