<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChronoLeak</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>ChronoLeak ⏳</h1>
            <button id="focusBtn" onclick="toggleFocus()">Enable Focus Mode</button>
        </header>

        <section class="timer-section">
            <h2>Timer</h2>
            <div id="timer">00:00</div>
            <div class="timer-buttons">
                <button onclick="startTimer()">Start</button>
                <button onclick="stopTimer()">Stop</button>
                <button onclick="resetTimer()">Reset</button>
            </div>
            <div id="leakStatus">No leaks yet ✅</div>
        </section>

        <section class="charts-section">
            <div class="chart">
                <h2>Leak Trend (Line Chart)</h2>
                <canvas id="leakChart"></canvas>
            </div>
            <div class="chart">
                <h2>Time Distribution (Pie Chart)</h2>
                <canvas id="pieChart"></canvas>
            </div>
        </section>

        <section class="analytics">
            <div class="report">
                <h2>Weekly Report</h2>
                <div id="weeklyReport"></div>
            </div>
            <div class="insights">
                <h2>AI Insights</h2>
                <div id="aiInsights"></div>
            </div>
        </section>
    </div>

<script src="script.js"></script>
</body>
</html>
