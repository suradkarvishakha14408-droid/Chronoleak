<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ChronoLeak</title>
    <link rel="stylesheet" href="style.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>
    <h1>ChronoLeak ⏳</h1>
    <p>Track your time. Catch your leaks. Improve focus.</p>
</header>

<section class="timer-box">
    <h2>Focus Timer</h2>
    <div class="time-display" id="timer">00:00</div>

    <div class="btns">
        <button onclick="startTimer()">Start</button>
        <button onclick="stopTimer()">Stop</button>
        <button onclick="resetTimer()">Reset</button>
    </div>

    <p id="leakStatus" class="leak-text">No leaks detected yet</p>
</section>

<section class="charts">
    <div class="chart-card">
        <h2>Leak Trend</h2>
        <canvas id="leakChart"></canvas>
    </div>

    <div class="chart-card">
        <h2>Time Distribution</h2>
        <canvas id="pieChart"></canvas>
    </div>
</section>

<section class="analytics">
    <h2>Weekly Report</h2>
    <p id="weeklyReport">Collecting data… use the app for a while 😊</p>

    <h2>AI Insights</h2>
    <p id="aiInsights">Waiting for enough data…</p>
</section>

<script src="script.js"></script>

</body>
</html>
